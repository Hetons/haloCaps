name: Build And Release (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 (from GitHub Releases)
        shell: pwsh
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "haloCaps-release-workflow"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $headers
          $setupAsset = $release.assets | Where-Object { $_.name -match 'AutoHotkey.*setup\.exe$' } | Select-Object -First 1
          if (-not $setupAsset) {
            throw "No setup exe asset found in AutoHotkey latest release."
          }
          Invoke-WebRequest -Uri $setupAsset.browser_download_url -OutFile "ahk-setup.exe" -Headers @{ "User-Agent" = "haloCaps-release-workflow" }
          Start-Process -FilePath ".\ahk-setup.exe" -ArgumentList "/S" -Wait

          $compilerCandidates = @(
            "$env:ProgramFiles\AutoHotkey\Compiler\Ahk2Exe.exe",
            "${env:ProgramFiles(x86)}\AutoHotkey\Compiler\Ahk2Exe.exe"
          )
          $baseCandidates = @(
            "$env:ProgramFiles\AutoHotkey\AutoHotkey64.exe",
            "${env:ProgramFiles(x86)}\AutoHotkey\AutoHotkey64.exe"
          )

          $compiler = $compilerCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          $baseExe = $baseCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

          if (-not $compiler) {
            throw "Ahk2Exe.exe not found after AutoHotkey installation."
          }
          if (-not $baseExe) {
            throw "AutoHotkey64.exe not found after AutoHotkey installation."
          }

          "AHK_COMPILER=$compiler" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AHK_BASE_EXE=$baseExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile haloCaps.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          & "$env:AHK_COMPILER" /in ".\haloCaps.ahk" /out ".\dist\haloCaps.exe" /base "$env:AHK_BASE_EXE"

      - name: Pack release assets
        shell: pwsh
        run: |
          Copy-Item ".\conf.ini" ".\dist\conf.ini" -Force
          Compress-Archive -Path ".\dist\*" -DestinationPath ".\haloCaps-master-${{ github.run_number }}.zip" -Force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ github.run_number }}
          name: master build ${{ github.run_number }}
          body: |
            Automated build from master.
            Commit: ${{ github.sha }}
          files: |
            ./dist/haloCaps.exe
            ./haloCaps-master-${{ github.run_number }}.zip
