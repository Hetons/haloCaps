name: Build And Release (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey v2 portable package
        shell: pwsh
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "haloCaps-release-workflow"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $headers
          $zipAsset = $release.assets | Where-Object { $_.name -match '^AutoHotkey_.*\.zip$' } | Select-Object -First 1
          if (-not $zipAsset) {
            throw "No AutoHotkey binary zip asset found in latest release."
          }
          Write-Host "Downloading asset: $($zipAsset.name)"
          Invoke-WebRequest -Uri $zipAsset.browser_download_url -OutFile "ahk-v2.zip" -Headers @{ "User-Agent" = "haloCaps-release-workflow" }
          Expand-Archive -Path "ahk-v2.zip" -DestinationPath "ahk-v2" -Force

          $compiler = Get-ChildItem -Path ".\ahk-v2" -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1
          $baseExe = Get-ChildItem -Path ".\ahk-v2" -Recurse -Filter "AutoHotkey64.exe" | Select-Object -First 1

          if (-not $compiler) {
            throw "Ahk2Exe.exe not found in extracted AutoHotkey package."
          }
          if (-not $baseExe) {
            throw "AutoHotkey64.exe not found in extracted AutoHotkey package."
          }

          Write-Host "Compiler: $($compiler.FullName)"
          Write-Host "BaseExe: $($baseExe.FullName)"
          "AHK_COMPILER=$($compiler.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AHK_BASE_EXE=$($baseExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile haloCaps.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          & "$env:AHK_COMPILER" /in ".\haloCaps.ahk" /out ".\dist\haloCaps.exe" /base "$env:AHK_BASE_EXE"

      - name: Pack release assets
        shell: pwsh
        run: |
          Copy-Item ".\conf.ini" ".\dist\conf.ini" -Force
          Compress-Archive -Path ".\dist\*" -DestinationPath ".\haloCaps-master-${{ github.run_number }}.zip" -Force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ github.run_number }}
          name: master build ${{ github.run_number }}
          body: |
            Automated build from master.
            Commit: ${{ github.sha }}
          files: |
            ./dist/haloCaps.exe
            ./haloCaps-master-${{ github.run_number }}.zip
