name: Build And Release (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey runtime and Ahk2Exe compiler
        shell: pwsh
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "haloCaps-release-workflow"
          }
          $ahkRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $headers
          $ahkZip = $ahkRelease.assets | Where-Object { $_.name -match '^AutoHotkey_.*\.zip$' } | Select-Object -First 1
          if (-not $ahkZip) {
            throw "No AutoHotkey runtime zip asset found."
          }
          Write-Host "Downloading AHK runtime asset: $($ahkZip.name)"
          Invoke-WebRequest -Uri $ahkZip.browser_download_url -OutFile "ahk-runtime.zip" -Headers @{ "User-Agent" = "haloCaps-release-workflow" }
          Expand-Archive -Path "ahk-runtime.zip" -DestinationPath "ahk-runtime" -Force

          $ahk2exeRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest" -Headers $headers
          $ahk2exeZip = $ahk2exeRelease.assets | Where-Object { $_.name -match '\.zip$' } | Select-Object -First 1
          if (-not $ahk2exeZip) {
            throw "No Ahk2Exe zip asset found."
          }
          Write-Host "Downloading Ahk2Exe asset: $($ahk2exeZip.name)"
          Invoke-WebRequest -Uri $ahk2exeZip.browser_download_url -OutFile "ahk2exe.zip" -Headers @{ "User-Agent" = "haloCaps-release-workflow" }
          Expand-Archive -Path "ahk2exe.zip" -DestinationPath "ahk2exe" -Force

          Write-Host "Runtime executables:"
          Get-ChildItem -Path ".\ahk-runtime" -Recurse -Filter "AutoHotkey*.exe" | ForEach-Object { Write-Host $_.FullName }
          Write-Host "Compiler executables:"
          Get-ChildItem -Path ".\ahk2exe" -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }

          $compiler = Get-ChildItem -Path ".\ahk2exe" -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1
          $baseExe = Get-ChildItem -Path ".\ahk-runtime" -Recurse -Filter "AutoHotkey64.exe" | Select-Object -First 1

          if (-not $compiler) {
            throw "Ahk2Exe.exe not found in extracted Ahk2Exe package."
          }
          if (-not $baseExe) {
            throw "AutoHotkey64.exe not found in extracted AutoHotkey runtime package."
          }

          Write-Host "Compiler: $($compiler.FullName)"
          Write-Host "BaseExe: $($baseExe.FullName)"
          "AHK_COMPILER=$($compiler.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AHK_BASE_EXE=$($baseExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile haloCaps.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $inFile = (Resolve-Path ".\haloCaps.ahk").Path
          $outFile = (Join-Path (Get-Location) "dist\haloCaps.exe")
          $baseFile = $env:AHK_BASE_EXE

          Write-Host "Compile input: $inFile"
          Write-Host "Compile output: $outFile"
          Write-Host "Compile base: $baseFile"

          $args = @("/in", $inFile, "/out", $outFile, "/base", $baseFile)
          $proc = Start-Process -FilePath "$env:AHK_COMPILER" -ArgumentList $args -Wait -PassThru
          Write-Host "Ahk2Exe exit code: $($proc.ExitCode)"

          if (-not (Test-Path $outFile)) {
            Write-Host "Expected output not found in dist. Searching workspace for haloCaps.exe..."
            $foundExe = Get-ChildItem -Path "." -Recurse -Filter "haloCaps.exe" | Select-Object -First 1
            if ($foundExe) {
              Write-Host "Found fallback exe: $($foundExe.FullName)"
              Copy-Item $foundExe.FullName $outFile -Force
            }
          }

          if (-not (Test-Path $outFile)) {
            Write-Host "Workspace file list for debugging:"
            Get-ChildItem -Path "." -Recurse | Select-Object -ExpandProperty FullName
            throw "Compile failed: haloCaps.exe was not produced."
          }

      - name: Pack release assets
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\haloCaps.exe")) {
            throw "Pack aborted: .\\dist\\haloCaps.exe does not exist."
          }
          Copy-Item ".\conf.ini" ".\dist\conf.ini" -Force
          Compress-Archive -Path ".\dist\*" -DestinationPath ".\haloCaps-master-${{ github.run_number }}.zip" -Force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ github.run_number }}
          name: master build ${{ github.run_number }}
          body: |
            Automated build from master.
            Commit: ${{ github.sha }}
          files: |
            ./dist/haloCaps.exe
            ./haloCaps-master-${{ github.run_number }}.zip
