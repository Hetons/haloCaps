name: Build And Release (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey v2 (from GitHub Releases)
        shell: pwsh
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "haloCaps-release-workflow"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $headers
          $zipAsset = $release.assets | Where-Object { $_.name -match '\.zip$' } | Select-Object -First 1
          if (-not $zipAsset) {
            throw "No zip asset found in AutoHotkey latest release."
          }
          Invoke-WebRequest -Uri $zipAsset.browser_download_url -OutFile "ahk-v2.zip" -Headers @{ "User-Agent" = "haloCaps-release-workflow" }
          Expand-Archive -Path "ahk-v2.zip" -DestinationPath "ahk-v2" -Force

      - name: Compile haloCaps.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $ahkCompiler = Get-ChildItem -Path ".\ahk-v2" -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1
          $ahkBase = Get-ChildItem -Path ".\ahk-v2" -Recurse -Filter "AutoHotkey64.exe" | Select-Object -First 1
          if (-not $ahkCompiler) {
            throw "Ahk2Exe.exe not found in extracted package."
          }
          if (-not $ahkBase) {
            throw "AutoHotkey64.exe not found in extracted package."
          }
          & $ahkCompiler.FullName /in ".\haloCaps.ahk" /out ".\dist\haloCaps.exe" /base $ahkBase.FullName

      - name: Pack release assets
        shell: pwsh
        run: |
          Copy-Item ".\conf.ini" ".\dist\conf.ini" -Force
          Compress-Archive -Path ".\dist\*" -DestinationPath ".\haloCaps-master-${{ github.run_number }}.zip" -Force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ github.run_number }}
          name: master build ${{ github.run_number }}
          body: |
            Automated build from master.
            Commit: ${{ github.sha }}
          files: |
            ./dist/haloCaps.exe
            ./haloCaps-master-${{ github.run_number }}.zip
