[global]
autostart = false
tap_action = keyFunc_imeSwitch
tap_threshold_ms = 500
[keys]
caps_a = keyFunc_moveLeft
caps_s = keyFunc_moveLeft
caps_d = keyFunc_moveDown
caps_f = keyFunc_moveRight
caps_q = keyFunc_delete 
caps_w = keyFunc_delete
caps_e = keyFunc_moveUp
caps_r = keyFunc_enter

[remap]
!c = ^c
!v = ^v
!z = ^z
!s = ^s
!f = ^f
!w = ^w
!a = ^a
!t = ^t
!q = {Alt Down}{F4}{Alt Up} 
